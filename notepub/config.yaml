site:
  id: default
  base_url: "http://127.0.0.1:8080/" # must end with /
  media_base_url: "http://127.0.0.1:8080/media/" # must end with /
  title: "Антон Ложкин"
  description: "Личный портал"
  default_og_image: "/assets/main.webp"
content:
  source: "local"
  local_dir: "../content"
paths:
  file_root: ./notepub/.notepub
  artifacts_dir: ./notepub/.notepub/artifacts
  snapshot_file: ./notepub/.notepub/snapshot/objects.json
  cache_root: ./notepub/.notepub/cache
theme:
  dir: "./notepub"
  name: "theme"
  templates_subdir: "templates"
  assets_subdir: "assets"
rules_path: "./notepub/rules.yaml"
server:
  listen: "127.0.0.1:8080"
cache:
  html_ttl_seconds: 600
  stale_if_error_seconds: 604800
